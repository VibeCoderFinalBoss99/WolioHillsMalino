    <title>Wolio Hills Malino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />

  <body>
    <div id="root">
      <style>
        .skel-hero { position: relative; display: flex; min-height: 100vh; align-items: center; justify-content: center; overflow: hidden; background-color: #0f2d52; }
        .skel-bg { position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; min-height: calc(100% + 2px); min-width: calc(100% + 2px); }
        .skel-img { height: 100%; width: 100%; max-width: none; object-fit: cover; object-position: center; min-height: 100vh; min-width: 100%; }
        .skel-grad { position: absolute; inset: 0; background-image: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.5), rgba(0,0,0,0.7)); }
        .skel-content { position: relative; z-index: 10; text-align: center; max-width: 64rem; margin: 0 auto; padding: 8rem 1.5rem 5rem 1.5rem; }
        .skel-title { font-family: 'Playfair Display', serif; font-weight: 900; color: white; font-size: 3rem; line-height: 0.9; margin-bottom: 1.5rem; letter-spacing: -0.025em; text-shadow: 0 10px 40px rgba(45,67,36,0.3); }
        .skel-subtitle { color: rgba(255,255,255,0.6); font-family: 'Inter', sans-serif; font-size: 1rem; max-width: 42rem; margin: 0 auto 2.5rem auto; line-height: 1.625; text-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        @media (min-width: 640px) { .skel-title { font-size: 3.75rem; } .skel-subtitle { font-size: 1.125rem; } }
        @media (min-width: 768px) { .skel-title { font-size: 4.5rem; } }
      </style>
      <div class="skel-hero">
        <div class="skel-bg">
          <img src="/images/hero-section.webp" class="skel-img" alt="" />
          <div class="skel-grad"></div>
        </div>
        <div class="skel-content">
          <h1 class="skel-title">Wolio Hills<br /><span style="color: #c9a84c;">Malino</span></h1>
          <p class="skel-subtitle">Wolio Hills Malino - Pengalaman menginap premium di tengah keindahan alam Malino yang memukau. Tempat perfect buat staycation, healing, dan quality time bareng orang tersayang!</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
